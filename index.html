<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Open Sans", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC] min-h-screen py-[78px]">

    <section class="min-h-[743px] max-w-[520px] bg-white  rounded-md card bg-base-100 w-full  mx-auto px-6">
        <div class="logo w-[100px] mx-auto pt-8">
            <img src="assets/github-logo.png" alt="">
        </div>
        <div class="text-center pt-6">
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <div class="form pt-3">
            <div>
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-[16px] text-black">Username</label>
                        <input id="input-username" type="email" class="input w-full" placeholder="Enter Username" />
                        <p class="text-[#4A00FF]">Default: admin</p>
                        <label class="label text-[16px] text-black">Password</label>
                        <input id="input-password" type="password" class="input w-full" placeholder="Enter Password" />
                        <p class="text-[#4A00FF]">Default: admin123</p>
                        <button id="login-btn" class="btn btn-neutral bg-[#4A00FF] mt-4">Sign In</button>
                        <p class="text-center text-[#64748B] text-[14px] pt-6">Demo Credentials:</p>
                        <div class="bg-[#F8FAFC] py-6 text-center mt-3 rounded-sm">
                            <p class="text-[16px]"><span class="font-bold ">Username:</span> admin</p>
                            <p class="text-[16px]"><span class="font-bold">Password</span> admin123</p>
                        </div>
                    </fieldset>
                </div>

            </div>


        </div>
    </section>
    <script src="/script/login.js"></script>

</body>

</html>
