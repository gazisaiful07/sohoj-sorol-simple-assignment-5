<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Open Sans", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <header class="bg-white border border-blue-50 sticky top-0 z-50">
        <div class="max-w-[1440px] mx-auto py-5 px-4 md:px6 flex flex-col md:flex-row justify-between items-center bg-white  w-full md:items-center gap-4 ">
            <div class="flex gap-3 flex items-center">
                <img class="w-[36px] cursor-pointer" src="assets/github-logo.png" alt="">
                <p class="text-3xl cursor-pointer md:text-3xl">GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-2">
                <label class="input w-full md:w-[320px]">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" class="w-full" type="search" required placeholder="Search Issues....." />
                </label>
                <button class="btn bg-[#4A00FF] text-white  sm:w-auto">+ New Issues</button>
            </div>

        </div>
    </header>
    <main class="max-w-[1110px] mx-auto  mt-[60px] px-5 ">
        <section class="class=px-7 py-5 flex gap-4">
            <div class="flex gap-3 mb-5">
                <button id="btn-all" class="btn btn-primary" onclick="filterIssues('all')">All</button>
                <button id="btn-open" class="btn btn-outline" onclick="filterIssues('open')">Open</button>
                <button id="btn-closed" class="btn btn-outline" onclick="filterIssues('closed')">Closed</button>
            </div>
        </section>
        <section>
            <div class="border bg-white border-gray-100 rounded-xl p-5 flex justify-between items-center mb-6">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
                        <span class="text-purple-600 text-lg p-2"><img src="assets/Aperture.png" alt=""></span>
                    </div>

                    <div>
                        <h2 id="total-issues" class="text-xl font-bold">0 Issues</h2>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 text-sm">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>
                        <span id="open-count">Open</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-purple-500 inline-block"></span>
                        <span id="closed-count">Closed</span>
                    </div>
                </div>
            </div>
        </section>
        <section class="">
            <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6  bg-white"></div>
        </section>
        <section class="max-w-[1110px] mx-auto mt-8 border border-blue-50 rounded-xl bg-white overflow-hidden">
            <!-- cards -->
            <div id="issues-container" class="px-7 pb-7 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 "></div>
        </section>
    </main>

    <script src="./script/main.js"></script>
</body>


</html>
