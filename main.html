<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Open Sans", sans-serif;
        }
    </style>

</head>

<body class="bg-[#F8FAFC]">
    <header class="bg-white border border-blue-50 sticky">
        <div class="max-w-[1440px] mx-auto py-[20px] flex justify-between items-center bg-white  w-full ">
            <div class="flex gap-3">
                <img class="w-[36px] cursor-pointer" src="assets/github-logo.png" alt="">
                <p class="text-3xl cursor-pointer">GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input class="w-full" type="search" required placeholder="Search Issues....." />
                </label>
                <button class="btn bg-[#4A00FF] text-white">+ New Issues</button>
            </div>

        </div>
    </header>
    <main class="max-w[1110px]   mt-[60px] ">
        <section class="flex gap-2 items-center">
            <div class="flex gap-3 mb-5">
                <button class="btn btn-primary" onclick="filterIssues('all')">All</button>
                <button class="btn btn-outline" onclick="filterIssues('open')">Open</button>
                <button class="btn btn-outline" onclick="filterIssues('closed')">Closed</button>
            </div>
        </section>
        <section>
            <div id="issues-container" class="grid grid-cols-4 gap-2"></div>
        </section>
    </main>
    <script src="./script/main.js"></script>
</body>


</html>
